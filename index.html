<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Discord Server Icon Size Preview</title>
  <style>
    :root {
      --bg: #1e1f22;
      --panel: #2b2d31;
      --card: #232428;
      --text: #f2f3f5;
      --muted: #b5bac1;
      --border: #3f4147;
      --accent: #5865f2;
      --discord-dark: #1e1f22;
      --discord-light: #f2f3f5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100svh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: max(16px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom));
    }

    main {
      width: min(560px, 100%);
      margin: 0 auto;
    }

    header {
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(20px, 6vw, 28px);
      line-height: 1.25;
      letter-spacing: .02em;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
      font-size: 14px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 12px 36px rgba(0, 0, 0, .24);
    }

    .controls {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    .file-label {
      display: grid;
      place-items: center;
      min-height: 48px;
      border: 0;
      border-radius: 14px;
      background: var(--accent);
      color: white;
      padding: 12px 14px;
      font-weight: 800;
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
    }

    .file-label input {
      display: none;
    }

    #fileName {
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
      min-height: 1.4em;
    }

    .preview-list {
      display: grid;
      gap: 12px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      display: grid;
      gap: 14px;
    }

    .label {
      display: grid;
      gap: 4px;
    }

    .size-title {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.2;
    }

    .size-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .theme-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .theme-box {
      min-height: 96px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, .08);
    }

    .theme-dark {
      background: var(--discord-dark);
    }

    .theme-light {
      background: var(--discord-light);
      border-color: rgba(0, 0, 0, .12);
    }

    .theme-name {
      position: absolute;
      left: 8px;
      bottom: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .02em;
      opacity: .72;
    }

    .theme-dark .theme-name {
      color: #f2f3f5;
    }

    .theme-light .theme-name {
      color: #313338;
    }

    .icon {
      display: block;
      border-radius: 50%;
      object-fit: cover;
      background: #313338;
      image-rendering: auto;
    }

    .size-40 { width: 40px; height: 40px; }
    .size-48 { width: 48px; height: 48px; }
    .size-56 { width: 56px; height: 56px; }

    .placeholder {
      border: 1px dashed #7a7e89;
    }

    .hidden {
      display: none;
    }

    .note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    @media (min-width: 600px) {
      body {
        padding: 32px;
        display: grid;
        place-items: center;
      }

      .panel {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Discord サーバーアイコン縮小プレビュー</h1>
      <p>画像を選ぶと、40px / 48px / 56px の円形マスクで表示します。各サイズをダーク背景・ライト背景の両方で確認できます。</p>
    </header>

    <section class="panel">
      <div class="controls">
        <label class="file-label">
          画像を選択
          <input id="fileInput" type="file" accept="image/*">
        </label>
        <div id="fileName">未選択</div>
      </div>

      <div class="preview-list">
        <div class="card">
          <div class="label">
            <div class="size-title">40 × 40 px</div>
            <div class="size-note">小さめ表示の耐性チェック</div>
          </div>
          <div class="theme-row">
            <div class="theme-box theme-dark">
              <img id="preview40Dark" class="icon size-40 placeholder" alt="40px dark preview">
              <div class="theme-name">Dark</div>
            </div>
            <div class="theme-box theme-light">
              <img id="preview40Light" class="icon size-40 placeholder" alt="40px light preview">
              <div class="theme-name">Light</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="label">
            <div class="size-title">48 × 48 px</div>
            <div class="size-note">標準サーバーリスト想定</div>
          </div>
          <div class="theme-row">
            <div class="theme-box theme-dark">
              <img id="preview48Dark" class="icon size-48 placeholder" alt="48px dark preview">
              <div class="theme-name">Dark</div>
            </div>
            <div class="theme-box theme-light">
              <img id="preview48Light" class="icon size-48 placeholder" alt="48px light preview">
              <div class="theme-name">Light</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="label">
            <div class="size-title">56 × 56 px</div>
            <div class="size-note">大きめ表示の確認</div>
          </div>
          <div class="theme-row">
            <div class="theme-box theme-dark">
              <img id="preview56Dark" class="icon size-56 placeholder" alt="56px dark preview">
              <div class="theme-name">Dark</div>
            </div>
            <div class="theme-box theme-light">
              <img id="preview56Light" class="icon size-56 placeholder" alt="56px light preview">
              <div class="theme-name">Light</div>
            </div>
          </div>
        </div>
      </div>

      <div class="note">外周ギリギリの文字や細線は、円形マスクと縮小でだいたい死にます。特に白フチ・黒フチの効き方はライト背景とダーク背景で見え方が変わるので、両方で見るのが安全です。</div>
    </section>
  </main>

  <script>
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const previews = [
      document.getElementById('preview40Dark'),
      document.getElementById('preview40Light'),
      document.getElementById('preview48Dark'),
      document.getElementById('preview48Light'),
      document.getElementById('preview56Dark'),
      document.getElementById('preview56Light')
    ];

    let objectUrl = null;

    fileInput.addEventListener('change', () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;

      if (objectUrl) {
        URL.revokeObjectURL(objectUrl);
      }

      objectUrl = URL.createObjectURL(file);
      fileName.textContent = file.name;

      for (const img of previews) {
        img.src = objectUrl;
        img.classList.remove('placeholder');
      }
    });
  </script>
</body>
</html>
